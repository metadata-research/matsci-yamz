name: PR Verify

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - name: Install Dependencies
      run: |
        pnpm install --frozen-lockfile

    - name: Lint
      run: |
        pnpm lint

    - name: Check Types
      run: |
        pnpm check-types

    - name: Check Migrations
      run: |
        pnpm db:check


